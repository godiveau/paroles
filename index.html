<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paroles de pub</title>
  <meta name="description" content="Générateur de perles de la pub">
  <style>
    :root {
      --bg1: #0b1f3a;
      --bg2: #123d6b;
      --accent: #21c55d;
      --accent-hover: #16a34a;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.8);
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.14), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(6px);
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: var(--text);
      font-size: 1.1rem;
    }

    .toplink {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .toplink:hover,
    .brand:hover { text-decoration: underline; }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .card {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px 24px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 4vw, 3rem);
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
    }

    .quote-box {
      min-height: 180px;
      display: grid;
      place-items: center;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .quote {
      margin: 0;
      max-width: 760px;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      line-height: 1.35;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    button, .ghost-link {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover, .ghost-link:hover {
      transform: translateY(-1px);
    }

    #new-quote {
      background: var(--accent);
      color: #08210f;
    }

    #new-quote:hover {
      background: var(--accent-hover);
    }

    .ghost-link {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.14);
    }

    footer {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .error {
      color: #ffd6d6;
      font-size: 1rem;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .card {
        padding: 28px 18px;
      }

      .quote-box {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="#">Paroles de pub</a>
    <a class="toplink" href="mailto:godiveau@gmail.com?subject=Parole%20de%20pub">Proposer une nouvelle perle</a>
  </nav>

  <main>
    <section class="card" aria-labelledby="titre-page">
      <h1 id="titre-page">Paroles de pub</h1>
      <p class="subtitle">Une perle au hasard, à chaque clic.</p>

      <div class="quote-box">
        <p id="quote" class="quote" aria-live="polite">Chargement…</p>
      </div>

      <div class="actions">
        <button id="new-quote" type="button">Allez, encore une</button>
  
      </div>
    </section>
  </main>

  <footer>
    Parolesdepub.com
  </footer>

  <script src="texts.js"></script>
  <script>
    (function () {
      const quoteElement = document.getElementById('quote');
      const button = document.getElementById('new-quote');
      let lastIndex = -1;

      function getTexts() {
        if (!Array.isArray(window.PAROLES_TEXTS)) {
          return [];
        }
        return window.PAROLES_TEXTS.filter(function (item) {
          return typeof item === 'string' && item.trim() !== '';
        });
      }

      function pickRandomIndex(length) {
        if (length <= 1) {
          return 0;
        }

        let index;
        do {
          index = Math.floor(Math.random() * length);
        } while (index === lastIndex);

        return index;
      }

      function showRandomQuote() {
        const texts = getTexts();

        if (texts.length === 0) {
          quoteElement.innerHTML = '<span class="error">Aucun texte disponible dans texts.js</span>';
          return;
        }

        const index = pickRandomIndex(texts.length);
        lastIndex = index;
        quoteElement.textContent = texts[index];
      }

      button.addEventListener('click', showRandomQuote);
      showRandomQuote();
    })();
  </script>
</body>
</html>
